# ============================================================
# AutoOps Monitor — Configuration File
# Edit these thresholds to tune alert sensitivity
# ============================================================

CPU_THRESHOLD=80        # Alert if CPU usage exceeds 80%
MEMORY_THRESHOLD=75     # Alert if memory usage exceeds 75%
DISK_THRESHOLD=90       # Alert if disk usage exceeds 90%
SERVICES="sshd crond nginx"  # Space-separated list of services to monitor

# Log and report paths (relative to project root)
LOG_FILE="logs/health.log"
REPORT_FILE="reports/report.html"
